gt;</span> response.buffer())</div><div class="line">.then(<span class="function">(<span class="params">buffer</span>) =&gt;</span> &#123;</div><div class="line">    fs.writeFile(<span class="string">"test.jpg"</span>, buffer,  <span class="string">"binary"</span>, (err)=&gt;&#123;</div><div class="line">        <span class="keyword">if</span>(err)&#123;</div><div class="line">            <span class="built_in">console</span>.log(<span class="string">"生成失败"</span>);</div><div class="line">        &#125;</div><div class="line">        <span class="built_in">console</span>.log(<span class="string">"文件生成成功"</span>);</div><div class="line">    &#125;);</div><div class="line">&#125;);</div></pre></td></tr></table></figure>
